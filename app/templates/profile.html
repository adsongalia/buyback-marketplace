{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-8">
        <div class="card p-5 shadow-lg border-0" style="background-color: #151b2b;">
            <h3 class="mb-5 fw-bolder text-center" style="color: #00e5ff; letter-spacing: 1px;">Your Profile</h3>
            {% if user %}
            <div class="d-flex justify-content-between align-items-center mb-4">
                <span style="color: #94a3b8; font-weight: 600; text-transform: uppercase;">Dota 2 Username</span>
                <span class="fw-bold text-white fs-5">{{ user.dota2_username }}</span>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <span style="color: #94a3b8; font-weight: 600; text-transform: uppercase;">Steam ID</span>
                <span class="text-white fs-5">{{ user.steam_id or 'Not Set' }}</span>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-5">
                <span style="color: #94a3b8; font-weight: 600; text-transform: uppercase;">Email Address</span>
                <span class="text-white fs-5">{{ user.email }}</span>
            </div>
            <div class="text-center mt-4">
                <a href="{{ url_for('edit_profile') }}" class="btn btn-outline-primary px-4 py-2 fw-bold shadow-sm"><i class="fas fa-user-edit me-2"></i> Edit Profile Settings</a>
                <a href="{{ url_for('change_password') }}" class="btn btn-outline-info px-4 py-2 fw-bold shadow-sm"><i class="fas fa-key me-2"></i> Change Password</a>
                <a href="{{ url_for('my_listings') }}" class="btn btn-outline-warning px-4 py-2 fw-bold shadow-sm"><i class="fas fa-tags me-2"></i> Manage Listings</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
